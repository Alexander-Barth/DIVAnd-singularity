name: Singularity Build
on: [push]
jobs:

  build:
    name: Build
    runs-on: ubuntu-20.04
    steps:

    - name: Install Dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y \
          build-essential \
          libssl-dev \
          uuid-dev \
          libgpgme11-dev 
    - run: sudo apt-get install -y zlib1g
